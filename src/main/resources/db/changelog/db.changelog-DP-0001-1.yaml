databaseChangeLog:
- changeSet:
    id: DP-0001-1_00_initiateTag
    author: daniel
    changes:
    - tagDatabase:
        tag: DP-0001-1
- changeSet:
    id: DP-0001-1_01_createType-acquirer_status
    author: daniel
    changes:
    - sql:
        sql: >
          CREATE TYPE "acquirer_status" AS ENUM ('ACTIVE', 'INACTIVE', 'DELETED');
          COMMENT ON TYPE "acquirer_status" IS 'Enumeration for acquirer status.';
    rollback:
    - sql:
        sql: DROP TYPE "acquirer_status" CASCADE;
- changeSet:
    id: DP-0001-1_02_createType-merchant_status
    author: daniel
    changes:
    - sql:
        sql: >
          CREATE TYPE "merchant_status" AS ENUM ('ACTIVE', 'INACTIVE', 'DELETED');
          COMMENT ON TYPE "merchant_status" IS 'Enumeration for merchant status.';
    rollback:
    - sql:
        sql: DROP TYPE "merchant_status" CASCADE;
- changeSet:
    id: DP-0001-1_03_createType-register_status
    author: daniel
    changes:
    - sql:
        sql: >
          CREATE TYPE "register_status" AS ENUM ('ACTIVE', 'INACTIVE', 'DELETED');
          COMMENT ON TYPE "register_status" IS 'Enumeration for register status.';
    rollback:
    - sql:
        sql: DROP TYPE "register_status" CASCADE;
- changeSet:
    id: DP-0001-1_04_createType-inquiry_status
    author: daniel
    changes:
    - sql:
        sql: >
          CREATE TYPE "inquiry_status" AS ENUM ('SUCCESS', 'FAILED', 'USED');
          COMMENT ON TYPE "inquiry_status" IS 'Enumeration for inquiry status.';
    rollback:
    - sql:
        sql: DROP TYPE "inquiry_status" CASCADE;
- changeSet:
    id: DP-0001-1_05_createType-payment_status
    author: daniel
    changes:
    - sql:
        sql: >
          CREATE TYPE "payment_status" AS ENUM ('SUCCESS', 'FAILED');
          COMMENT ON TYPE "payment_status" IS 'Enumeration for payment status.';
    rollback:
    - sql:
        sql: DROP TYPE "payment_status" CASCADE;
- changeSet:
    id: DP-0001-1_06_createTable-acquirer
    author: daniel
    changes:
    - createTable:
        tableName: acquirer
        columns:
        - column:
            name: id
            type: BIGINT
            autoIncrement: true
            constraints:
              primaryKey: true
              primaryKeyName: pk_acquirer
              nullable: false
        - column:
            name: name
            type: VARCHAR(128)
            constraints:
              nullable: false
        - column:
            name: client_id
            type: VARCHAR(32)
            constraints:
              nullable: false
        - column:
            name: client_secret
            type: VARCHAR(256)
            constraints:
              nullable: false
        - column:
            name: status
            type: acquirer_status
            constraints:
              nullable: false
        - column:
            name: created_date
            type: TIMESTAMP WITH TIME ZONE
            defaultValueComputed: CURRENT_TIMESTAMP
        - column:
            name: updated_date
            type: TIMESTAMP WITH TIME ZONE
